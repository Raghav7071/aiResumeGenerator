<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind Knowledge Engine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .sidebar-gradient { background: linear-gradient(180deg, #0b0f0c 0%, #022c22 100%); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .transition-all { transition: all 0.2s ease-in-out; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); }
        @keyframes pulse-green {
            0%, 100% { border-color: #22c55e; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { border-color: #4ade80; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); }
        }
        .focus-ring:focus { outline: none; animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const paths = {
                plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/>,
                database: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 1.1.9 2 2 2h12a2 2 0 002-2V7M4 7a2 2 0 012-2h12a2 2 0 012 2M4 7c0 1.1.9 2 2 2h12a2 2 0 002-2M9 21v-8m3 8v-8m3 8v-8"/>,
                bookmark: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>,
                'pie-chart': <g><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"/></g>,
                download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>,
                'file-text': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>,
                'trash-2': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>,
                'arrow-left': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>,
                'refresh-cw': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>,
                'folder-open': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>,
                settings: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065zM15 12a3 3 0 11-6 0 3 3 0 016 0z"/>,
                share: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>,
                bot: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 2a10 10 0 0110 10v2a5 5 0 01-5 5H7a5 5 0 01-5-5v-2a10 10 0 0110-10zM12 11h.01M9 11h.01M15 11h.01"/>,
                mic: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3zM19 10v2a7 7 0 01-14 0v-2M12 18v4m-4 0h8"/>,
                'arrow-up': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>,
                x: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/>,
                'book-open': <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>,
                link: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
            };
            return (
                <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    {paths[name] || <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" strokeWidth="2"/>}
                </svg>
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity">
                    <div className="bg-[#1e1e1e] rounded-2xl w-full max-w-md overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-gray-800">
                        <div className="flex justify-between items-center p-4 border-b border-gray-800">
                            <h3 className="text-white font-medium">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-white transition-colors">
                                <Icon name="x" className="w-5 h-5" />
                            </button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const ShareModal = ({ isOpen, onClose }) => (
            <Modal isOpen={isOpen} onClose={onClose} title="Share link to chat">
                <div className="space-y-6">
                    <div className="bg-[#2d2d2d] rounded-xl p-4 flex flex-col items-center justify-center gap-2 relative overflow-hidden h-36 border border-gray-700">
                       <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                       <div className="w-12 h-12 bg-[#14532d] rounded-xl flex items-center justify-center shadow-lg relative z-10">
                           <Icon name="book-open" className="w-6 h-6 text-[#4ade80]" />
                       </div>
                       <h4 className="text-white font-medium text-sm relative z-10 mt-1">DocuMind AI Session</h4>
                    </div>
                    <div className="flex justify-around pt-2">
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={() => { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); onClose(); }} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                                <Icon name="link" className="w-5 h-5" />
                            </button>
                            <span className="text-xs text-gray-400 font-medium">Copy link</span>
                        </div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={() => window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=Check out my DocuMind AI Session!`, '_blank')} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center font-bold text-lg hover:bg-gray-200 transition-colors">𝕏</button>
                            <span className="text-xs text-gray-400 font-medium">X</span>
                        </div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={() => window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank')} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center font-bold text-lg hover:bg-gray-200 transition-colors">in</button>
                            <span className="text-xs text-gray-400 font-medium">LinkedIn</span>
                        </div>
                        <div className="flex flex-col items-center gap-2">
                            <button onClick={() => window.open(`https://reddit.com/submit?url=${encodeURIComponent(window.location.href)}&title=Check out my DocuMind AI Session!`, '_blank')} className="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                                <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 11.5c0-1.65-1.35-3-3-3-.96 0-1.86.48-2.42 1.24-1.64-1-3.75-1.64-6.07-1.72.08-1.1.4-3.05 1.52-3.7.72-.4 1.73-.24 3 .5C17.2 6.3 18.46 7.5 20 7.5c1.65 0 3-1.35 3-3s-1.35-3-3-3c-1.38 0-2.54.94-2.88 2.22-1.43-.72-2.64-.8-3.6-.25-1.64.94-1.95 3.47-2 4.55-2.33.08-4.45.7-6.1 1.72C4.86 8.98 3.96 8.5 3 8.5c-1.65 0-3 1.35-3 3 0 1.32.84 2.44 2.05 2.84-.03.22-.05.44-.05.66 0 3.86 4.5 7 10 7s10-3.14 10-7c0-.22-.02-.44-.05-.66 1.2-.4 2.05-1.54 2.05-2.84zM2.3 11.5c0-1.1.9-2 2-2 .64 0 1.22.32 1.6.82-1.1.85-1.92 1.9-2.3 3.1-.8-.35-1.3-1.15-1.3-1.92zm15 3.8c.84 0 1.5.66 1.5 1.5s-.66 1.5-1.5 1.5-1.5-.66-1.5-1.5.66-1.5 1.5-1.5zm-5.5 3.2c-2.3 0-4.22-.9-4.22-2h1.5c0 .54 1.22 1 2.7 1s2.7-.46 2.7-1h1.5c0 1.1-1.9 2-4.2 2zm-4.5-3.2c.84 0 1.5.66 1.5 1.5s-.66 1.5-1.5 1.5-1.5-.66-1.5-1.5.66-1.5 1.5-1.5zm10.4-3.1c-.38-1.2-1.2-2.26-2.3-3.1.38-.5.96-.82 1.6-.82 1.1 0 2 .9 2 2 0 .77-.5 1.57-1.3 1.92z"/></svg>
                            </button>
                            <span className="text-xs text-gray-400 font-medium">Reddit</span>
                        </div>
                    </div>
                </div>
            </Modal>
        );

        const SettingsModal = ({ isOpen, onClose, onReset }) => {
            const [model, setModel] = useState("llama-3.1-8b-instant");
            const [temperature, setTemperature] = useState("0.3");

            const handleReset = async () => {
                if (window.confirm("Are you sure you want to clear all documents?")) {
                    try {
                        const response = await fetch('/reset', { method: 'POST' });
                        if (response.ok) {
                            alert("Database cleared!");
                            onReset();
                            onClose();
                        }
                    } catch (err) {
                        alert("Reset failed.");
                    }
                }
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Settings">
                    <div className="space-y-6 text-gray-300">
                        <div className="space-y-2">
                            <label className="text-sm font-medium">Inference Model</label>
                            <select 
                                value={model} 
                                onChange={(e) => setModel(e.target.value)}
                                className="w-full bg-[#2d2d2d] border border-gray-700 rounded-lg p-2.5 text-white outline-none focus:border-green-500 transition-colors"
                            >
                                <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant (Fast)</option>
                                <option value="llama-3.3-70b-versatile">Llama 3.3 70B Versatile (Accurate)</option>
                                <option value="mixtral-8x7b-32768">Mixtral 8x7B (Balanced)</option>
                            </select>
                        </div>
                        
                        <div className="space-y-2">
                            <label className="text-sm font-medium flex justify-between">
                                <span>Temperature</span>
                                <span>{temperature}</span>
                            </label>
                            <input 
                                type="range" 
                                min="0" max="1" step="0.1" 
                                value={temperature} 
                                onChange={(e) => setTemperature(e.target.value)}
                                className="w-full accent-green-500 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer"
                            />
                            <p className="text-xs text-gray-500 pt-1">Lower for exact citations, higher for creative synthesis.</p>
                        </div>

                        <div className="flex items-center justify-between pt-6 border-t border-gray-800">
                            <div>
                                <h4 className="text-sm font-medium text-white">Clear local memory</h4>
                                <p className="text-[10px] text-gray-500 mt-1">Remove all uploaded documents and history.</p>
                            </div>
                            <button onClick={handleReset} className="px-4 py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-lg text-sm font-medium hover:bg-red-500/20 transition-colors flex items-center gap-2 cursor-pointer">
                                <Icon name="trash-2" className="w-4 h-4" /> Clear All
                            </button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const SidebarItem = ({ icon, label, active = false, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-[#14532d] text-white shadow-lg' : 'text-gray-400 hover:bg-[#022c22] hover:text-white'}`}>
                <Icon name={icon} className="w-4 h-4" />
                <span className="text-sm font-medium">{label}</span>
            </button>
        );

        const KnowledgeView = ({ onBack }) => {
            const [docs, setDocs] = useState([]);
            const [loading, setLoading] = useState(true);

            const fetchDocs = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/documents');
                    const data = await res.json();
                    setDocs(data.documents || []);
                } catch (e) {
                    console.error("Failed to fetch docs", e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchDocs();
            }, []);

            const handleDelete = async (filename) => {
                if (!window.confirm(`Delete ${filename}?`)) return;
                try {
                    const res = await fetch(`/documents/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                    if (res.ok) {
                        setDocs(prev => prev.filter(d => d.filename !== filename));
                    }
                } catch (e) {
                    alert("Delete failed");
                }
            };

            return (
                <div className="flex-1 p-8 overflow-y-auto">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">Knowledge Base</h2>
                                <p className="text-sm text-gray-500 mt-1">Manage your indexed documents and collections.</p>
                            </div>
                            <button onClick={onBack} className="p-2 hover:bg-green-100 rounded-full transition-colors text-green-700">
                                <Icon name="arrow-left" className="w-6 h-6" />
                            </button>
                        </div>

                        {loading ? (
                            <div className="flex justify-center py-20">
                                <Icon name="refresh-cw" className="w-8 h-8 text-green-500 animate-spin" />
                            </div>
                        ) : docs.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {docs.map((doc, idx) => (
                                    <div key={idx} className="bg-white border border-green-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all group">
                                        <div className="flex justify-between items-start">
                                            <div className="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center mb-4">
                                                <Icon name="file-text" className="w-5 h-5 text-green-600" />
                                            </div>
                                            <button onClick={() => handleDelete(doc.filename)} className="p-2 text-gray-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                                <Icon name="trash-2" className="w-4 h-4" />
                                            </button>
                                        </div>
                                        <h3 className="font-semibold text-gray-800 truncate mb-1" title={doc.filename}>{doc.filename}</h3>
                                        <div className="flex gap-4 mt-4">
                                            <div className="text-[10px] text-gray-400 uppercase font-bold tracking-wider">
                                                <span className="text-green-600 mr-1">{doc.page_count}</span> Pages
                                            </div>
                                            <div className="text-[10px] text-gray-400 uppercase font-bold tracking-wider">
                                                <span className="text-green-600 mr-1">{doc.chunk_count}</span> Chunks
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20 bg-white border border-dashed border-green-200 rounded-3xl">
                                <Icon name="folder-open" className="w-12 h-12 text-gray-300 mx-auto mb-4" />
                                <h3 className="text-gray-500 font-medium">Empty Knowledge Base</h3>
                                <p className="text-xs text-gray-400 mt-1">Upload files to get started.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I am DocuMind Knowledge Engine. Upload your research documents to begin our synthesis session.' }
            ]);
            const [input, setInput] = useState('');
            const [isListening, setIsListening] = useState(false);
            const [recentFiles, setRecentFiles] = useState([]);
            const [pipelineStatus, setPipelineStatus] = useState(null);
            const [currentView, setCurrentView] = useState('chat');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isShareOpen, setIsShareOpen] = useState(false);
            
            const fileInputRef = useRef(null);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleNewChat = () => {
                setMessages([{ role: 'assistant', content: 'Session reset. How can I help you today?' }]);
                setCurrentView('chat');
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setPipelineStatus("Initializing Ingestion Pipeline...");
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/upload', { method: 'POST', body: formData });
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        try {
                            const data = JSON.parse(chunk);
                            if (data.status) setPipelineStatus(data.status);
                        } catch(e) {}
                    }
                    setRecentFiles(prev => [file.name, ...prev].slice(0, 5));
                    setPipelineStatus("Document Successfully Indexed!");
                    setTimeout(() => setPipelineStatus(null), 3000);
                } catch (err) {
                    setPipelineStatus("Upload Failed.");
                    console.error(err);
                }
            };

            const handleSend = async () => {
                if (!input.trim()) return;
                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setPipelineStatus("Researching Documents...");

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        try {
                            const data = JSON.parse(chunk);
                            if (data.status) setPipelineStatus(data.status);
                            if (data.answer) {
                                setMessages(prev => [...prev, { role: 'assistant', content: data.answer, citations: data.citations }]);
                            }
                        } catch(e) {}
                    }
                    setPipelineStatus(null);
                } catch (err) {
                    setPipelineStatus("Error generating response.");
                    console.error(err);
                }
            };

            const renderView = () => {
                switch(currentView) {
                    case 'chat':
                        return (
                            <React.Fragment>
                                <div className="flex-1 overflow-y-auto chat-container p-8 space-y-6">
                                    <div className="max-w-3xl mx-auto w-full space-y-8">
                                        {messages.map((msg, i) => (
                                            <div key={i} className={`flex gap-4 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                {msg.role === 'assistant' && (
                                                    <div className="w-8 h-8 rounded-lg bg-[#22c55e]/20 flex items-center justify-center flex-shrink-0">
                                                        <Icon name="bot" className="w-5 h-5 text-[#22c55e]" />
                                                    </div>
                                                )}
                                                <div className={`max-w-[85%] px-4 py-3 rounded-2xl ${
                                                    msg.role === 'user' 
                                                    ? 'bg-[#14532d] text-white shadow-md' 
                                                    : 'bg-white border border-green-100 text-gray-800 shadow-sm'
                                                }`}>
                                                    <div className="text-sm leading-relaxed whitespace-pre-wrap">{msg.content}</div>
                                                    {msg.citations && msg.citations.length > 0 && (
                                                        <div className="mt-4 pt-3 border-t border-green-50 flex flex-wrap gap-2">
                                                            {msg.citations.map((cite, idx) => (
                                                                <span key={idx} className="bg-green-50 text-[10px] px-2 py-1 rounded-md text-green-700 font-medium border border-green-200">
                                                                    {cite.filename} (p. {cite.page_number})
                                                                </span>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>
                                </div>
                                <div className="p-6 bg-transparent">
                                    <div className="max-w-3xl mx-auto relative">
                                        {pipelineStatus && (
                                            <div className="absolute -top-10 left-0 right-0 flex justify-center">
                                                <div className="bg-[#14532d] text-white px-4 py-1.5 rounded-full text-xs font-medium flex items-center gap-2 shadow-lg animate-bounce">
                                                    <Icon name="refresh-cw" className="w-3 h-3 text-white" />
                                                    {pipelineStatus}
                                                </div>
                                            </div>
                                        )}
                                        <div className="glass border-2 border-green-100 rounded-3xl p-2 shadow-2xl flex items-center gap-2 pr-4 focus-within:border-green-400 transition-all">
                                            <input type="file" ref={fileInputRef} onChange={handleUpload} className="hidden" accept=".pdf" />
                                            <button onClick={() => fileInputRef.current.click()} className="w-10 h-10 rounded-full bg-gray-100 text-gray-500 hover:bg-green-100 hover:text-green-600 flex items-center justify-center transition-all">
                                                <Icon name="plus" className="w-5 h-5" />
                                            </button>
                                            <textarea 
                                                value={input}
                                                onChange={(e) => setInput(e.target.value)}
                                                onKeyPress={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                                                placeholder="Ask anything about your documents..."
                                                className="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 px-2 resize-none max-h-32 placeholder-gray-400"
                                                rows="1"
                                            ></textarea>
                                            <div className="flex gap-2">
                                                <button onClick={() => setIsListening(!isListening)} className={`w-10 h-10 rounded-full transition-all flex items-center justify-center ${isListening ? 'bg-red-100 text-red-500 shadow-md' : 'text-gray-400 hover:bg-gray-100'}`}><Icon name="mic" className="w-5 h-5" /></button>
                                                <button onClick={handleSend} disabled={!input.trim()} className="w-10 h-10 rounded-full bg-[#22c55e] text-white disabled:bg-gray-200 disabled:text-gray-400 hover:bg-[#16a34a] transition-all flex items-center justify-center shadow-lg"><Icon name="arrow-up" className="w-6 h-6" /></button>
                                            </div>
                                        </div>
                                        <div className="text-center mt-3 text-[10px] text-gray-400">DocuMind AI can make mistakes. Verify important information.</div>
                                    </div>
                                </div>
                            </React.Fragment>
                        );
                    case 'knowledge':
                        return <KnowledgeView onBack={handleNewChat} />;
                    case 'citations':
                    case 'analytics':
                    case 'export':
                        return (
                            <div className="flex-1 flex flex-col items-center justify-center text-center p-8">
                                <div className="w-20 h-20 bg-green-50 rounded-3xl flex items-center justify-center mb-6">
                                    <Icon name={currentView === 'citations' ? 'bookmark' : (currentView === 'analytics' ? 'pie-chart' : 'download')} className="w-10 h-10 text-green-600" />
                                </div>
                                <h3 className="text-xl font-medium text-gray-800 mb-2">Feature Coming Soon</h3>
                                <p className="text-gray-500 max-w-sm">We are working on expanding the {currentView} module. Stay tuned for future updates!</p>
                                <button onClick={handleNewChat} className="mt-8 px-6 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-all font-medium">Back to Session</button>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="flex h-full bg-[#f8fafc]">
                    <aside className="w-72 bg-[#001b15] h-full p-6 flex flex-col shadow-2xl z-20">
                        <div className="flex items-center gap-3 mb-10 px-2">
                             <div className="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center shadow-lg shadow-green-500/20">
                                 <Icon name="database" className="w-6 h-6 text-white" />
                             </div>
                             <h1 className="text-xl font-bold text-white tracking-tight">DocuMind</h1>
                        </div>
                        <nav className="flex-1 space-y-2 overflow-y-auto">
                            <SidebarItem icon="plus" label="New Chat" active={currentView === 'chat'} onClick={handleNewChat} />
                            <SidebarItem icon="database" label="Knowledge Base" active={currentView === 'knowledge'} onClick={() => setCurrentView('knowledge')} />
                            <SidebarItem icon="bookmark" label="Saved Citations" active={currentView === 'citations'} onClick={() => setCurrentView('citations')} />
                            <SidebarItem icon="pie-chart" label="Analytics" active={currentView === 'analytics'} onClick={() => setCurrentView('analytics')} />
                            <SidebarItem icon="download" label="Export Data" active={currentView === 'export'} onClick={() => setCurrentView('export')} />
                            <div className="pt-6 pb-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3">Recents</div>
                            <div className="space-y-1">
                                {recentFiles.length > 0 ? recentFiles.map((file, idx) => (
                                    <button key={idx} className="w-full text-left px-3 py-2 text-xs text-gray-400 hover:text-white truncate transition-all flex items-center gap-2">
                                        <Icon name="file-text" className="w-3 h-3" /> {file}
                                    </button>
                                )) : (
                                    <div className="px-3 py-2 text-xs text-gray-600 italic">No recent uploads</div>
                                )}
                            </div>
                        </nav>
                    </aside>
                    <main className="flex-1 flex flex-col relative">
                        <header className="h-16 flex items-center justify-between px-8 bg-white/50 backdrop-blur-md border-b border-green-100">
                            <h2 className="text-lg font-semibold text-gray-800">DocuMind Knowledge Engine</h2>
                            <div className="flex gap-4">
                                <button className="p-2 text-gray-500 hover:text-green-600 transition-all" onClick={() => setIsShareOpen(true)} title="Share Chat"><Icon name="share" className="w-5 h-5" /></button>
                                <button className="p-2 text-gray-500 hover:text-green-600 transition-all" onClick={() => setIsSettingsOpen(true)} title="Settings"><Icon name="settings" className="w-5 h-5" /></button>
                            </div>
                        </header>
                        {renderView()}
                    </main>
                    <ShareModal isOpen={isShareOpen} onClose={() => setIsShareOpen(false)} />
                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} onReset={() => { setRecentFiles([]); handleNewChat(); }} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
